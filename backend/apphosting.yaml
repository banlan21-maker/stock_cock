# Firebase App Hosting Backend configuration
# Stock Cock Python FastAPI backend deployed via Docker on Cloud Run

runConfig:
  cpu: 1
  memoryMiB: 1024
  concurrency: 40
  maxInstances: 10
  minInstances: 0

env:
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME
  - variable: SUPABASE_URL
    secret: SUPABASE_URL
    availability:
      - RUNTIME
  - variable: SUPABASE_SERVICE_KEY
    secret: SUPABASE_SERVICE_KEY
    availability:
      - RUNTIME
  - variable: NAVER_CLIENT_ID
    secret: NAVER_CLIENT_ID
    availability:
      - RUNTIME
  - variable: NAVER_CLIENT_SECRET
    secret: NAVER_CLIENT_SECRET
    availability:
      - RUNTIME
  - variable: NEWS_API_KEY
    secret: NEWS_API_KEY
    availability:
      - RUNTIME
  - variable: DART_API_KEY
    secret: DART_API_KEY
    availability:
      - RUNTIME
  - variable: FRONTEND_URL
    secret: FRONTEND_URL
    availability:
      - RUNTIME
